name: Build docker image
on: push
permissions:
  contents: read
  packages: write
jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Use Node.js 20.20.2
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - name: Build
        run: npm ci && npm --prefix api ci && npm run generate:all
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image tag
        id: tag-generator
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag-generator.outputs.IMAGE_TAG }}
      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/build-${{ steps.tag-generator.outputs.IMAGE_TAG }}',
              sha: context.sha
            })
