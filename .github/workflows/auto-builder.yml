name: Github Action Auto Builder

on:
  push:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js 20.20.2
      uses: actions/setup-node@v4
      with:
        node-version: 20.20.2
        cache: npm
        cache-dependency-path: |
          package-lock.json
          api/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Install API dependencies
      run: npm --prefix api ci

    - name: Generate Docs
      run: npm run generate:all

    - name: Upload GitHub Pages artifact
      uses: actions/upload-artifact@v4
      with:
        name: github-pages
        path: public
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest

    needs: [ build ]

    steps:
    - name: Download GitHub Pages artifact
      uses: actions/download-artifact@v4
      with:
        name: github-pages
        path: public

    - name: Init Repo and Commit
      run: |
        cd ./public
        git config --global user.email "nobody@github.com"
        git config --global user.name "Github Action Auto Builder"
        git init
        git add --all .
        git commit -m "Github Action Auto Builder"

    - name: Push Docs to Github Pages Repo
      env:
        GITHUB_PAGES_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
      run: |
        set -eu

        if [ -z "$GITHUB_PAGES_DEPLOY_KEY" ]; then
          echo "::error::Missing secret PAGES_DEPLOY_KEY"
          exit 1
        fi

        install -m 700 -d ~/.ssh
        printf '%s\n' "$GITHUB_PAGES_DEPLOY_KEY" > "$RUNNER_TEMP/github_pages_deploy_key"
        chmod 600 "$RUNNER_TEMP/github_pages_deploy_key"
        ssh-keyscan github.com >> ~/.ssh/known_hosts

        cd ./public
        GIT_SSH_COMMAND="ssh -i ${RUNNER_TEMP}/github_pages_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
          git push --quiet --force git@github.com:screeps-cn/screeps-cn.github.io.git master

    - name: Push Docs to Gitee Pages Repo
      run: |
        cd ./public
        git push --quiet --force https://LokiSharp:${{ secrets.GITEE_TOKEN }}@gitee.com/screeps-cn/screeps-cn.git master
